<!-- Auth Icon Update Script -->
<script>
function updateAuthIcon() {
    const isLoggedIn = localStorage.getItem('ai_learning_logged_in') === 'true';
    const userData = JSON.parse(localStorage.getItem('ai_learning_user') || '{}');
    const authIcon = document.getElementById('authIcon');
    
    if (authIcon && isLoggedIn && userData.email) {
        authIcon.innerHTML = '<i class="fas fa-arrow-right-from-bracket"></i>';
        authIcon.title = '로그아웃';
        authIcon.href = '#';
        authIcon.classList.add('logged-in');
        authIcon.onclick = function(e) {
            e.preventDefault();
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('ai_learning_logged_in');
                localStorage.removeItem('ai_learning_user');
                alert('로그아웃 되었습니다.');
                location.reload();
            }
        };
    }
}
updateAuthIcon();
</script>
