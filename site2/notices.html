<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 - TG에듀테크</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/enhanced-styles.css">
    <link rel="stylesheet" href="css/samsung-nav.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 공지사항 페이지 스타일 */
        .notices-hero {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            padding: 80px 0 60px;
            color: white;
            text-align: center;
        }
        
        .notices-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .notices-hero p {
            font-size: 1.1rem;
            opacity: 0.95;
        }
        
        .notices-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }
        
        .notices-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .notice-item {
            padding: 24px 30px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .notice-item:last-child {
            border-bottom: none;
        }
        
        .notice-item:hover {
            background: #f9fafb;
        }
        
        .notice-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .notice-badge.important {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .notice-badge.normal {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .notice-badge.event {
            background: #fef3c7;
            color: #d97706;
        }
        
        .notice-content {
            flex: 1;
            min-width: 0;
        }
        
        .notice-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notice-new {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .notice-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }
        
        .notice-meta i {
            margin-right: 4px;
        }
        
        .notice-icon {
            color: #9ca3af;
            font-size: 1.2rem;
        }
        
        /* 상세보기 모달 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background-color: white;
            margin: 20px;
            padding: 0;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            padding: 30px 30px 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .modal-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }
        
        .modal-body {
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
            line-height: 1.8;
            color: #374151;
        }
        
        .modal-body p {
            margin-bottom: 16px;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f3f4f6;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #6b7280;
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            background: #e5e7eb;
            color: #111827;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #d1d5db;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #374151;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .notices-hero h1 {
                font-size: 2rem;
            }
            
            .notice-item {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
            }
            
            .notice-meta {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .modal-content {
                width: 95%;
                margin: 10px;
            }
            
            .modal-header, .modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <!-- Top Utility Bar -->
        <div class="utility-bar">
            <div class="container">
                <div class="utility-wrapper">
                    <a href="support.html" class="utility-link">학습 도우미</a>
                    <a href="notices.html" class="utility-link">공지사항</a>
                    <a href="#" class="utility-link">TG패밀리</a>
                    <a href="https://trigem.career.greetinghr.com/ko/intro" target="_blank" class="external-link tg-alliance">
                        TG Alliance <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="index.html" class="external-link" style="color: #ff8c00;">
                        TG 에듀테크 <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Navigation Bar -->
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <!-- Left Side: Logo + Menu -->
                    <div class="nav-left">
                        <a href="index.html" class="logo">
                            <i class="fas fa-brain"></i>
                            <span><span class="logo-tg">TG</span> AI 캠퍼스</span>
                        </a>
                        
                        <ul class="nav-menu">
                            <li><a href="about.html">TG AI 캠퍼스 소개</a></li>
                            <li><a href="programs.html">강좌 소개</a></li>
                            <li><a href="courses.html">AI 활용 추천영상</a></li>
                            <li><a href="manuals.html">AI 활용 메뉴얼</a></li>
                            <li><a href="dictionary.html">AI 용어 사전</a></li>
                            <li><a href="dashboard.html">학습현황</a></li>
                            <li><a href="#" style="color: #0099FF;">TG INSIDE</a></li>
                        </ul>
                    </div>
                    
                    <!-- Right Side: Search + Icons -->
                    <div class="nav-right">
                        <!-- Search -->
                        <div class="search-wrapper">
                            <form class="search-form">
                                <button type="submit" class="search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                                <input type="text" class="search-input" placeholder="검색" autocomplete="off">
                            </form>
                        </div>
                        
                        <!-- Icon Actions -->
                        <div class="icon-actions">
                            <a href="mypage.html" class="icon-link" title="마이페이지">
                                <img src="images/mypage-icon-new.png?v=2" alt="마이페이지" class="icon-img mypage-icon" style="width: auto !important; height: 20px !important; max-height: 20px !important;">
                            </a>
                            <a href="login.html" class="icon-link" id="authIcon" title="로그인">
                                <img src="images/logout-icon.png" alt="로그인" class="icon-img" style="width: 24px !important; height: 24px !important; max-width: 24px !important; max-height: 24px !important;">
                            </a>
                        </div>
                        
                        <!-- Mobile Toggle -->
                        <button class="mobile-menu-toggle" id="mobileMenuToggle">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="notices-hero">
        <h1><i class="fas fa-bullhorn"></i> 공지사항</h1>
        <p>TG에듀테크의 새로운 소식을 확인하세요</p>
    </section>

    <!-- Main Content -->
    <main class="notices-container">
        <!-- Loading State -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: #6b7280;">공지사항을 불러오는 중...</p>
        </div>

        <!-- Notices List -->
        <div class="notices-list" id="noticesList" style="display: none;">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-inbox"></i>
            <h3>등록된 공지사항이 없습니다</h3>
            <p>새로운 공지사항이 등록되면 알려드리겠습니다</p>
        </div>
    </main>

    <!-- Notice Detail Modal -->
    <div id="noticeModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        let allNotices = [];

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNotices();
            setupMobileMenu();
        });

        // 공지사항 로드
        async function loadNotices() {
            try {
                const response = await fetch('tables/notices?limit=100&sort=-created_at');
                const data = await response.json();
                
                // status가 'published'인 공지만 필터링
                allNotices = data.data.filter(notice => notice.status === 'published');
                
                // 화면 표시
                displayNotices();
                
            } catch (error) {
                console.error('공지사항 로드 실패:', error);
                showEmptyState();
            }
        }

        // 공지사항 화면에 표시
        function displayNotices() {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const noticesList = document.getElementById('noticesList');
            const emptyState = document.getElementById('emptyState');

            loadingSpinner.style.display = 'none';

            if (allNotices.length === 0) {
                noticesList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            // 공지사항 목록 생성
            noticesList.innerHTML = allNotices.map(notice => {
                const isNew = isNewNotice(notice.created_at);
                const badgeClass = notice.priority === 'urgent' ? 'important' : 
                                  notice.category === '이벤트' ? 'event' : 'normal';
                const badgeText = notice.priority === 'urgent' ? '중요' : 
                                 notice.category === '이벤트' ? '이벤트' : '일반';
                
                return `
                    <div class="notice-item" onclick="showNoticeDetail('${notice.id}')">
                        <span class="notice-badge ${badgeClass}">${badgeText}</span>
                        <div class="notice-content">
                            <div class="notice-title">
                                ${escapeHtml(notice.title)}
                                ${isNew ? '<span class="notice-new">NEW</span>' : ''}
                            </div>
                            <div class="notice-meta">
                                <span><i class="far fa-calendar"></i>${formatDate(notice.created_at)}</span>
                                <span><i class="far fa-user"></i>${escapeHtml(notice.author || '관리자')}</span>
                                <span><i class="far fa-eye"></i>${notice.views || 0}</span>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right notice-icon"></i>
                    </div>
                `;
            }).join('');

            noticesList.style.display = 'block';
            emptyState.style.display = 'none';
        }

        // 공지사항 상세보기
        function showNoticeDetail(noticeId) {
            const notice = allNotices.find(n => n.id === noticeId);
            if (!notice) return;

            // 모달 내용 설정
            document.getElementById('modalTitle').textContent = notice.title;
            document.getElementById('modalMeta').innerHTML = `
                <span><i class="far fa-calendar"></i>${formatDate(notice.created_at)}</span>
                <span><i class="far fa-user"></i>${escapeHtml(notice.author || '관리자')}</span>
                <span><i class="far fa-eye"></i>${notice.views || 0}</span>
            `;
            
            // 본문 내용 (줄바꿈 처리)
            const content = notice.content || '내용이 없습니다.';
            document.getElementById('modalBody').innerHTML = content.replace(/\n/g, '<br>');

            // 모달 표시
            document.getElementById('noticeModal').classList.add('active');

            // 조회수 증가 (선택사항)
            incrementViews(noticeId);
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('noticeModal').classList.remove('active');
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('noticeModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 조회수 증가
        async function incrementViews(noticeId) {
            try {
                const notice = allNotices.find(n => n.id === noticeId);
                if (!notice) return;

                const newViews = (notice.views || 0) + 1;
                
                await fetch(`tables/notices/${noticeId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ views: newViews })
                });

                // 로컬 데이터 업데이트
                notice.views = newViews;
                
            } catch (error) {
                console.error('조회수 업데이트 실패:', error);
            }
        }

        // 새 공지인지 확인 (3일 이내)
        function isNewNotice(createdAt) {
            const now = Date.now();
            const created = new Date(createdAt).getTime();
            const threeDays = 3 * 24 * 60 * 60 * 1000;
            return (now - created) < threeDays;
        }

        // 날짜 포맷
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}.${month}.${day}`;
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 빈 화면 표시
        function showEmptyState() {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('noticesList').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }

        // 모바일 메뉴
        function setupMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const navMenu = document.querySelector('.nav-menu');
            
            if (toggle) {
                toggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }
        }

        // 검색 기능
        document.getElementById('searchForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                window.location.href = `courses.html?search=${encodeURIComponent(query)}`;
            }
        });
    </script>
</body>
</html>
