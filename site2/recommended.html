<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추천강의 - TG에듀테크</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/enhanced-styles.css">
    <link rel="stylesheet" href="css/samsung-nav.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 추천강의 페이지 전용 스타일 */
        .recommended-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 80px 0 60px;
            color: white;
            text-align: center;
        }
        
        .recommended-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .recommended-hero p {
            font-size: 1.1rem;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .recommended-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }
        
        .filter-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 10px 24px;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -12px;
        }
        
        .filter-tab:hover {
            color: #0066cc;
        }
        
        .filter-tab.active {
            color: #0066cc;
            border-bottom-color: #0066cc;
        }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .video-card button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #f3f4f6;
            position: relative;
            overflow: hidden;
        }
        
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-thumbnail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }
        
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(0, 102, 204, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: all 0.3s ease;
        }
        
        .video-card:hover .play-icon {
            background: rgba(0, 102, 204, 1);
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .play-icon i {
            color: white;
            font-size: 24px;
            margin-left: 3px;
        }
        
        .video-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            z-index: 2;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-course {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 12px;
        }
        
        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        
        .video-category {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #d1d5db;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #374151;
        }
        
        .empty-state p {
            font-size: 1rem;
        }
        
        /* Button styles */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .recommended-hero h1 {
                font-size: 2rem;
            }
            
            .videos-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .filter-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            
            .filter-tab {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <!-- Top Utility Bar -->
        <div class="utility-bar">
            <div class="container">
                <div class="utility-wrapper">
                    <a href="support.html" class="utility-link">학습 도우미</a>
                    <a href="notices.html" class="utility-link">공지사항</a>
                    <a href="#" class="utility-link">TG패밀리</a>
                    <a href="https://trigem.career.greetinghr.com/ko/intro" target="_blank" class="external-link tg-alliance">
                        TG Alliance <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="index.html" class="external-link" style="color: #ff8c00;">
                        TG 에듀테크 <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Navigation Bar -->
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <!-- Left Side: Logo + Menu -->
                    <div class="nav-left">
                        <a href="index.html" class="logo">
                            <i class="fas fa-brain"></i>
                            <span><span class="logo-tg">TG</span> AI 캠퍼스</span>
                        </a>
                        
                        <ul class="nav-menu">
                            <li><a href="about.html">TG AI 캠퍼스 소개</a></li>
                            <li><a href="programs.html">강좌 소개</a></li>
                            <li><a href="courses.html">AI 활용 추천영상</a></li>
                            <li><a href="manuals.html">AI 활용 메뉴얼</a></li>
                            <li><a href="dictionary.html">AI 용어 사전</a></li>
                            <li><a href="dashboard.html">학습현황</a></li>
                            <li><a href="#" style="color: #0099FF;">TG INSIDE</a></li>
                        </ul>
                    </div>
                    
                    <!-- Right Side: Search + Icons -->
                    <div class="nav-right">
                        <!-- Search -->
                        <div class="search-wrapper">
                            <form class="search-form">
                                <button type="submit" class="search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                                <input type="text" class="search-input" placeholder="검색" autocomplete="off">
                            </form>
                        </div>
                        
                        <!-- Icon Actions -->
                        <div class="icon-actions">
                            <a href="mypage.html" class="icon-link" title="마이페이지">
                                <img src="images/mypage-icon-new.png?v=2" alt="마이페이지" class="icon-img mypage-icon" style="width: auto !important; height: 20px !important; max-height: 20px !important;">
                            </a>
                            <a href="login.html" class="icon-link" id="authIcon" title="로그인">
                                <img src="images/logout-icon.png" alt="로그인" class="icon-img" style="width: 24px !important; height: 24px !important; max-width: 24px !important; max-height: 24px !important;">
                            </a>
                        </div>
                        
                        <!-- Mobile Toggle -->
                        <button class="mobile-menu-toggle" id="mobileMenuToggle">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="recommended-hero">
        <h1><i class="fas fa-star"></i> 추천강의</h1>
        <p>TG에듀테크가 엄선한 최고의 강의를 만나보세요</p>
    </section>

    <!-- Main Content -->
    <main class="recommended-container">
        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-category="all">전체</button>
            <button class="filter-tab" data-category="인공지능">인공지능</button>
            <button class="filter-tab" data-category="머신러닝">머신러닝</button>
            <button class="filter-tab" data-category="딥러닝">딥러닝</button>
            <button class="filter-tab" data-category="데이터분석">데이터분석</button>
            <button class="filter-tab" data-category="프로그래밍">프로그래밍</button>
        </div>

        <!-- Loading State -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: #6b7280;">강의를 불러오는 중...</p>
        </div>

        <!-- Videos Grid -->
        <div class="videos-grid" id="videosGrid" style="display: none;">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-video-slash"></i>
            <h3>등록된 영상이 없습니다</h3>
            <p id="emptyMessage">관리자 페이지에서 영상을 추가해주세요</p>
            <div style="margin-top: 20px;">
                <a href="admin-login.html" class="btn btn-primary">어드민 페이지로 이동</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // 전역 변수
        let allVideos = [];
        let currentCategory = 'all';

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            await loadVideos();
            setupFilters();
            setupMobileMenu();
        });

        // 영상 데이터 로드
        async function loadVideos() {
            try {
                // 영상 데이터 가져오기
                const videosResponse = await fetch('tables/videos?limit=100');
                const videosData = await videosResponse.json();
                
                // 강의 데이터 가져오기 (영상과 연결하기 위해)
                const coursesResponse = await fetch('tables/courses?limit=100');
                const coursesData = await coursesResponse.json();
                
                console.log('📊 로드된 영상 수:', videosData.data ? videosData.data.length : 0);
                console.log('📊 로드된 강의 수:', coursesData.data ? coursesData.data.length : 0);
                
                // 영상과 강의 매핑
                allVideos = (videosData.data || []).map(video => {
                    const course = coursesData.data.find(c => c.id === video.course_id);
                    return {
                        ...video,
                        courseName: course ? course.title : '강의 정보 없음',
                        courseCategory: course ? (course.category || '기타') : '기타'
                    };
                });

                console.log('✅ 매핑된 영상:', allVideos);
                console.log('📁 카테고리 목록:', [...new Set(allVideos.map(v => v.courseCategory))]);

                // 정렬 (순서별)
                allVideos.sort((a, b) => (a.order || 0) - (b.order || 0));

                // 화면 표시
                displayVideos();
                
            } catch (error) {
                console.error('❌ 영상 로드 실패:', error);
                showEmptyState();
            }
        }

        // 영상 화면에 표시
        function displayVideos() {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const videosGrid = document.getElementById('videosGrid');
            const emptyState = document.getElementById('emptyState');

            loadingSpinner.style.display = 'none';

            console.log('🎬 전체 영상 수:', allVideos.length);
            console.log('🔍 현재 카테고리:', currentCategory);

            // 필터링
            let filteredVideos = allVideos;
            if (currentCategory !== 'all') {
                filteredVideos = allVideos.filter(video => 
                    video.courseCategory === currentCategory
                );
                console.log(`📂 "${currentCategory}" 카테고리 영상 수:`, filteredVideos.length);
            }

            // 영상이 없는 경우
            if (filteredVideos.length === 0) {
                console.log('⚠️ 표시할 영상이 없습니다.');
                videosGrid.style.display = 'none';
                emptyState.style.display = 'block';
                
                // 디버깅 정보 표시
                if (allVideos.length > 0) {
                    console.log('💡 힌트: 강의의 카테고리를 확인하세요. 등록된 카테고리:', 
                        [...new Set(allVideos.map(v => v.courseCategory))].join(', '));
                }
                return;
            }

            console.log('✅ 화면에 표시할 영상 수:', filteredVideos.length);

            // 영상 카드 생성
            videosGrid.innerHTML = filteredVideos.map(video => `
                <div class="video-card" onclick="playVideo('${video.id}', '${video.video_url}', '${escapeHtml(video.title)}')">
                    <div class="video-thumbnail">
                        <img src="${getThumbnailUrl(video.video_url)}" alt="${escapeHtml(video.title)}">
                        <div class="play-icon">
                            <i class="fas fa-play"></i>
                        </div>
                        ${video.duration ? `<div class="video-duration">${video.duration}</div>` : ''}
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${escapeHtml(video.title)}</h3>
                        <p class="video-course">
                            <i class="fas fa-book"></i> ${escapeHtml(video.courseName)}
                        </p>
                        <div class="video-meta">
                            <span class="video-category">${escapeHtml(video.courseCategory || '기타')}</span>
                            <span><i class="fas fa-eye"></i> ${Math.floor(Math.random() * 1000) + 100}</span>
                        </div>
                        <button onclick="event.stopPropagation(); playVideo('${video.id}', '${video.video_url}', '${escapeHtml(video.title)}')" 
                                style="width:100%; margin-top:10px; padding:10px; background:#667eea; color:white; border:none; border-radius:6px; cursor:pointer; font-size:0.9rem; font-weight:600;">
                            <i class="fas fa-play"></i> 재생하기
                        </button>
                    </div>
                </div>
            `).join('');

            videosGrid.style.display = 'grid';
            emptyState.style.display = 'none';
        }

        // 빈 화면 표시
        function showEmptyState() {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('videosGrid').style.display = 'none';
            const emptyState = document.getElementById('emptyState');
            const emptyMessage = document.getElementById('emptyMessage');
            
            if (allVideos.length === 0) {
                emptyMessage.textContent = '등록된 영상이 없습니다. 어드민 페이지에서 강의와 영상을 추가해주세요.';
            } else {
                emptyMessage.textContent = `현재 선택한 카테고리에 영상이 없습니다. "전체" 탭을 확인해보세요.`;
            }
            
            emptyState.style.display = 'block';
        }

        // 썸네일 URL 추출
        function getThumbnailUrl(videoUrl) {
            try {
                // YouTube embed URL에서 비디오 ID 추출
                const match = videoUrl.match(/embed\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`;
                }
                
                // 일반 비디오 파일인 경우 플레이스홀더 이미지
                if (videoUrl.includes('.mp4') || videoUrl.includes('gtv-videos')) {
                    // 랜덤 교육 관련 이미지
                    const images = [
                        'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&h=225&fit=crop',
                        'https://images.unsplash.com/photo-1555255707-c07966088b7b?w=400&h=225&fit=crop',
                        'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=400&h=225&fit=crop',
                        'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400&h=225&fit=crop',
                        'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&h=225&fit=crop'
                    ];
                    // URL 기반으로 일관된 이미지 선택
                    const hash = videoUrl.split('').reduce((a, b) => ((a << 5) - a) + b.charCodeAt(0), 0);
                    return images[Math.abs(hash) % images.length];
                }
            } catch (e) {
                console.error('썸네일 추출 실패:', e);
            }
            return 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=400&h=225&fit=crop';
        }

        // 영상 재생
        function playVideo(videoId, videoUrl, videoTitle) {
            console.log('🎬 영상 재생:', {videoId, videoUrl, videoTitle});
            
            // courses.html로 이동
            window.location.href = `courses.html?video=${videoId}`;
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 필터 설정
        function setupFilters() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // 활성 탭 변경
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    // 카테고리 변경
                    currentCategory = tab.dataset.category;
                    
                    // 영상 다시 표시
                    displayVideos();
                });
            });
        }

        // 모바일 메뉴
        function setupMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const navMenu = document.querySelector('.nav-menu');
            
            if (toggle) {
                toggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }
        }

        // 검색 기능
        document.getElementById('searchForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                window.location.href = `courses.html?search=${encodeURIComponent(query)}`;
            }
        });
    </script>
</body>
